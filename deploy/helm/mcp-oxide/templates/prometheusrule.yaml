{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "mcp-oxide.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-oxide.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}{{- toYaml . | nindent 4 }}{{- end }}
spec:
  groups:
    - name: mcp-oxide
      rules: {{- toYaml .Values.prometheusRule.rules | nindent 8 }}
{{- end }}
