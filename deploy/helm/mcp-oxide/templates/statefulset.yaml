apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mcp-oxide.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mcp-oxide.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "mcp-oxide.headlessServiceName" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  podManagementPolicy: {{ .Values.workload.podManagementPolicy }}
  updateStrategy: {{- toYaml .Values.workload.updateStrategy | nindent 4 }}
  selector:
    matchLabels: {{- include "mcp-oxide.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-oxide.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{- toYaml . | nindent 8 }}{{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}{{- toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "mcp-oxide.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "mcp-oxide.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: MCP_OXIDE_CONFIG
              value: /etc/mcp-oxide/gateway.yaml
            {{- with .Values.env }}{{- toYaml . | nindent 12 }}{{- end }}
          {{- with .Values.envFrom }}
          envFrom: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          startupProbe: {{- toYaml .Values.probes.startup | nindent 12 }}
          livenessProbe: {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe: {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.lifecycle.preStopSleepSeconds }}"]
          volumeMounts:
            - name: config
              mountPath: /etc/mcp-oxide
              readOnly: true
            {{- with .Values.extraVolumeMounts }}{{- toYaml . | nindent 12 }}{{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp-oxide.fullname" . }}-config
        {{- with concat .Values.extraVolumesDefault .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
