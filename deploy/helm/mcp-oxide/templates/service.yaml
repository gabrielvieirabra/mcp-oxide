apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-oxide.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mcp-oxide.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "mcp-oxide.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ports.http }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
      protocol: TCP
{{- if .Values.serviceHeadless.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-oxide.headlessServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mcp-oxide.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: {{- include "mcp-oxide.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ports.http }}
      targetPort: http
      protocol: TCP
{{- end }}
