# Default values for mcp-oxide.
# Production defaults; override with values-local.yaml for development.

image:
  repository: ghcr.io/anomalyco/mcp-oxide
  tag: ""   # defaults to Chart.appVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 3

# StatefulSet so pods are individually addressable for sticky routing.
workload:
  kind: StatefulSet
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  podManagementPolicy: OrderedReady

serviceAccount:
  create: true
  name: ""
  annotations: {}

podLabels: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "2"
    memory: "1Gi"

# Ports exposed by the container / service.
ports:
  http: 8080
  metrics: 9090

service:
  type: ClusterIP
  annotations: {}

serviceHeadless:
  enabled: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mcp-oxide.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

gatewayApi:
  enabled: false
  parentRefs: []
  hostnames: []

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior: {}

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: false
  ingress: []
  egress: []

# Prometheus Operator integration.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

prometheusRule:
  enabled: false
  labels: {}
  rules: []

# Probes: Phase 0 ships minimal endpoints. Phase 11 promotes them.
probes:
  startup:
    httpGet: { path: /healthz/startup, port: http }
    periodSeconds: 5
    failureThreshold: 12
  liveness:
    httpGet: { path: /healthz/live, port: http }
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    httpGet: { path: /readyz, port: http }
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

lifecycle:
  preStopSleepSeconds: 5

terminationGracePeriodSeconds: 60

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

# Gateway configuration rendered into a ConfigMap.
config:
  server:
    bind: "0.0.0.0:8080"
  logs:
    json: true

# Extra environment variables.
env: []
envFrom: []

extraVolumes: []
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
extraVolumesDefault:
  - name: tmp
    emptyDir: {}
